apiVersion: agentic.prototype.x-k8s.io/v0alpha0
kind: XAccessPolicy
metadata:
  name: quickstart-gateway-level-policy
  namespace: quickstart-ns
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentic-net-gateway
  rules:
    - name: allow-echo
      source:
        type: ServiceAccount
        serviceAccount:
          name: adk-agent-sa
          namespace: quickstart-ns
      authorization:
        type: InlineTools
        tools:
          - "echo"
          - "get-sum"
          - "get-tiny-image"
          - "read_wiki_structure"
